<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Visitors — VisitorPass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <div class="main-wrap">
    <div id="navbar"></div>

    <div class="page-body">
      <div class="page-header">
        <h1>My Visitors</h1>
        <p>All visitors assigned to you</p>
      </div>

      <div class="table-controls">
        <div class="section-header" style="margin:0; border:none; padding:0;">
          <span class="section-title">Visitor history</span>
          <span id="visitorCount" class="section-count">0</span>
        </div>
        <div class="search-bar">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          <input type="text" id="searchHostVisitors" placeholder="Search visitors..." oninput="handleHostSearch()">
        </div>
      </div>

      <div id="list" class="space-y"></div>

      <div class="pagination" style="margin-top: 20px; border-radius: var(--radius-md); border: 1px solid var(--slate-200);">
        <div class="page-info" id="hostPageInfo">Showing 0 records</div>
        <div class="page-buttons">
          <button class="page-btn" id="hostPrevBtn" onclick="prevHostPage()">Previous</button>
          <button class="page-btn" id="hostNextBtn" onclick="nextHostPage()">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/visitors.js"></script>
  <script>
    setupLayout();
    loadHostVisitors();
  </script>
</body>
</html>
