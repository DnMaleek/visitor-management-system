<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments — VisitorPass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <div class="main-wrap">
    <div id="navbar"></div>

    <div class="page-body">
      <div class="page-header">
        <h1>Departments</h1>
        <p>Manage company departments for visitor routing</p>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-title">Add department</div>
          <div class="form-group">
            <label class="form-label">Department name</label>
            <input id="deptName" class="input" placeholder="e.g. Engineering">
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input id="desc" class="input" placeholder="Brief description">
          </div>
          <button onclick="createDepartment()" class="btn btn-primary" style="width:100%;margin-top:4px;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Save Department
          </button>
        </div>

        <div>
          <div class="section-header">
            <span class="section-title">All departments</span>
            <span id="deptCount" class="section-count">0</span>
          </div>
          <div id="departments" class="space-y"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script>
    setupLayout();
    loadDepartments();

    async function loadDepartments() {
      const data = await api("/admin/departments");
      const el = document.getElementById("departments");
      document.getElementById("deptCount").innerText = data.length;

      if (!data.length) {
        el.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
          </div>
          <h3>No departments yet</h3>
          <p>Add your first department using the form</p>
        </div>`;
        return;
      }

      const colors = ["blue","green","amber"];
      el.innerHTML = data.map((d, i) => `
        <div class="list-item">
          <div class="list-item-icon ${colors[i % colors.length]}">${d.name.charAt(0).toUpperCase()}</div>
          <div class="list-item-body">
            <div class="list-item-title">${d.name}</div>
            <div class="list-item-sub">${d.description || "No description"}</div>
          </div>
        </div>
      `).join("");
    }

    async function createDepartment() {
      const name = document.getElementById("deptName").value.trim();
      const desc = document.getElementById("desc").value.trim();
      if (!name) return;
      await api("/admin/departments", "POST", { name, description: desc });
      document.getElementById("deptName").value = "";
      document.getElementById("desc").value = "";
      showToast("Department saved successfully");
      loadDepartments();
    }
  </script>
</body>
</html>
