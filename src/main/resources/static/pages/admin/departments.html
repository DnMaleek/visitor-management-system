<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments — VisitorPass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <div class="main-wrap">
    <div id="navbar"></div>

    <div class="page-body">
      <div class="page-header">
        <h1>Departments</h1>
        <p>Manage company departments for visitor routing</p>
      </div>

      <div>
        <div class="table-controls">
          <div class="section-header" style="margin:0; border:none; padding:0;">
            <span class="section-title">All departments</span>
            <span id="deptCount" class="section-count">0</span>
          </div>
          <div class="search-bar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            <input type="text" id="searchDept" placeholder="Search departments..." oninput="handleDeptSearch()">
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Department</th>
                <th style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="departments"></tbody>
          </table>
          <div class="pagination">
            <div class="page-info" id="deptPageInfo">Showing 0 records</div>
            <div class="page-buttons">
              <button class="page-btn" id="deptPrevBtn" onclick="prevDeptPage()">Previous</button>
              <button class="page-btn" id="deptNextBtn" onclick="nextDeptPage()">Next</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Floating Action Button -->
      <button class="fab" onclick="openDeptModal()" title="Add New Department">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </button>

      <!-- Modal for Department -->
      <div id="deptModal" class="modal-overlay">
        <div class="modal-content">
          <div class="modal-header">
            <div id="modalTitle" class="modal-title">Add department</div>
            <button class="modal-close" onclick="cancelEdit()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label class="form-label">Department name</label>
              <input id="deptName" class="input" placeholder="e.g. Engineering">
            </div>
            <div class="form-group">
              <label class="form-label">Description</label>
              <input id="desc" class="input" placeholder="Brief description">
            </div>
            <div id="formActions" class="space-y" style="gap: 8px; display: flex; flex-direction: column; margin-top: 16px;">
              <button id="saveBtn" onclick="saveDepartment()" class="btn btn-primary" style="width:100%;">
                <svg id="saveBtnIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:15px;height:15px;display:inline-block;vertical-align:middle;margin-right:4px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                <span id="saveBtnText">Save Department</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script>
    setupLayout();
    loadDepartments();
    let allDepts = [];
    let filteredDepts = [];
    let currentPage = 1;
    const pageSize = 10;
    let editingId = null;

    async function loadDepartments() {
      const depts = await api("/admin/departments");
      allDepts = Array.isArray(depts) ? depts : [];
      filteredDepts = [...allDepts];
      currentPage = 1;
      const s = document.getElementById("searchDept");
      if (s) s.value = "";
      renderDepartments();
    }

    function handleDeptSearch() {
      const q = document.getElementById("searchDept").value.toLowerCase();
      filteredDepts = allDepts.filter(d => 
        (d.name || "").toLowerCase().includes(q) ||
        (d.description || "").toLowerCase().includes(q)
      );
      currentPage = 1;
      renderDepartments();
    }

    function prevDeptPage() {
      if (currentPage > 1) { currentPage--; renderDepartments(); }
    }
    function nextDeptPage() {
      if (currentPage * pageSize < filteredDepts.length) { currentPage++; renderDepartments(); }
    }

    function renderDepartments() {
      const el = document.getElementById("departments");
      const countEl = document.getElementById("deptCount");
      if (countEl) countEl.innerText = filteredDepts.length;

      const total = filteredDepts.length;
      const startIdx = (currentPage - 1) * pageSize;
      const list = filteredDepts.slice(startIdx, startIdx + pageSize);

      const pageInfo = document.getElementById("deptPageInfo");
      if (pageInfo) pageInfo.innerText = total === 0 ? "No records" : `Showing ${startIdx + 1} to ${Math.min(startIdx + pageSize, total)} of ${total}`;
      const prevBtn = document.getElementById("deptPrevBtn");
      if (prevBtn) prevBtn.disabled = currentPage === 1;
      const nextBtn = document.getElementById("deptNextBtn");
      if (nextBtn) nextBtn.disabled = currentPage * pageSize >= total;

      if (!list.length) {
        el.innerHTML = `<tr><td colspan="2"><div class="empty-state">
          <div class="empty-state-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25M9 16.5v.75m3-3v3M15 12v5.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
          </div>
          <h3>No departments found</h3>
        </div></td></tr>`;
        return;
      }

      el.innerHTML = list.map(d => `
        <tr>
          <td>
            <div style="font-weight:600;color:var(--slate-900);font-size:14px;">${d.name}</div>
            <div style="font-size:13px;color:var(--slate-500);margin-top:2px;">${d.description || "—"}</div>
          </td>
          <td>
            <div class="actions-cell">
              <button onclick="startEdit(${d.id})" class="btn" style="padding:6px;border-radius:6px;background:var(--slate-100);color:var(--slate-700);" title="Edit Department">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.89 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.89l10.682-10.682z"/></svg>
              </button>
              <button onclick="deleteDepartment(${d.id})" class="btn btn-danger" style="padding:6px;border-radius:6px;" title="Delete Department">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function openDeptModal() {
      document.getElementById("deptModal").classList.add("active");
    }

    function closeDeptModal() {
      document.getElementById("deptModal").classList.remove("active");
    }

    function startEdit(id) {
      const d = allDepts.find(item => item.id === id);
      if (!d) return;

      editingId = id;
      document.getElementById("modalTitle").innerText = "Edit department";
      document.getElementById("deptName").value = d.name;
      document.getElementById("desc").value = d.description || "";
      document.getElementById("saveBtnText").innerText = "Update Department";
      document.getElementById("saveBtnIcon").innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>`;
      openDeptModal();
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById("modalTitle").innerText = "Add department";
      document.getElementById("deptName").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("saveBtnText").innerText = "Save Department";
      document.getElementById("saveBtnIcon").innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>`;
      closeDeptModal();
    }

    async function saveDepartment() {
      const name = document.getElementById("deptName").value.trim();
      const desc = document.getElementById("desc").value.trim();
      if (!name) {
        showToast("Department name is required", "error");
        return;
      }

      if (editingId) {
        await api("/admin/departments/" + editingId, "PUT", { name, description: desc });
        showToast("Department updated successfully");
        cancelEdit(); // Also closes the modal
      } else {
        await api("/admin/departments", "POST", { name, description: desc });
        showToast("Department saved successfully");
        document.getElementById("deptName").value = "";
        document.getElementById("desc").value = "";
        closeDeptModal();
      }
      loadDepartments();
    }

    async function deleteDepartment(id) {
      if (!confirm("Are you sure you want to delete this department? This will unassign any users and visitors from it.")) {
        return;
      }

      try {
        await api("/admin/departments/" + id, "DELETE");
        showToast("Department deleted successfully");
        if (editingId === id) {
          cancelEdit();
        }
        loadDepartments();
      } catch (error) {
        showToast("Failed to delete department", "error");
      }
    }
  </script>
</body>
</html>
