<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — VisitorPass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <div class="main-wrap">
    <div id="navbar"></div>

    <div class="page-body">
      <div class="page-header">
        <h1>Users</h1>
        <p>Manage system accounts and role assignments</p>
      </div>

      <div class="two-col">
        <!-- Create form -->
        <div class="card">
          <div class="card-title">Add new user</div>
          <div class="form-group">
            <label class="form-label">Username</label>
            <input id="uname" class="input" placeholder="e.g. john.doe">
          </div>
          <div class="form-group">
            <label class="form-label">Full name</label>
            <input id="fullname" class="input" placeholder="e.g. John Doe">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input id="email" class="input" type="email" placeholder="e.g. john@company.com">
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select id="role" class="input">
              <option value="ADMIN">Admin</option>
              <option value="HOST">Host</option>
              <option value="SECURITY_GUARD">Security Guard</option>
            </select>
          </div>
          <button onclick="createUser()" class="btn btn-primary" style="width:100%;margin-top:4px;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Create User
          </button>
        </div>

        <!-- User list -->
        <div>
          <div class="section-header">
            <span class="section-title">All users</span>
            <span id="userCount" class="section-count">0</span>
          </div>
          <div id="users" class="space-y"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="../../assets/js/users.js"></script>
  <script>
    setupLayout();
    loadUsers();
  </script>
</body>
</html>
